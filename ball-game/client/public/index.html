<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>Graviball</title>
    <style>
      :root { color-scheme: dark; }
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        color: #fff;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      }

      /* App layout */
      #app {
        position: relative;
        width: 100%;
        height: 100%;
      }

      /* Fullscreen game canvas */
      #game {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        background: #000;
      }

      /* Minimal HUD */
      #hud {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      #timer {
        position: absolute;
        top: 12px;
        left: 12px;
        font-size: 14px;
        line-height: 1;
        opacity: 0.92;
        letter-spacing: 0.2px;
        text-shadow: 0 0 8px rgba(255,255,255,0.08);
      }

      #footer {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 10px 12px;
        font-size: 12px;
        opacity: 0.82;
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        text-shadow: 0 0 10px rgba(255,255,255,0.06);
      }

      /* Visually hidden but accessible */
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0,0,0,0);
        white-space: nowrap;
        border: 0;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="game" aria-label="Graviball playfield"></canvas>

      <div id="hud">
        <div id="timer" aria-live="polite">
          <span class="sr-only">Session time:</span>
          <span id="timerValue">0.0s</span>
        </div>

        <div id="footer">
          Graviball.com is the open gaming experiment by Giorgi Dolidze. Let's keep winning the gravity togather.
        </div>
      </div>
    </div>

    <!-- Vite entry (build will rewrite paths into /dist assets) -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
